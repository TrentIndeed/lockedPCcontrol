<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locked PC Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
        }
        header h1 { font-size: 16px; font-weight: 600; }
        .status-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #555; display: inline-block; margin-right: 8px;
        }
        .status-dot.running { background: #4caf50; }

        .settings {
            display: flex; align-items: center; gap: 12px; font-size: 13px;
        }
        .settings label { color: #aaa; }
        .settings input[type=number] {
            width: 60px; padding: 4px 8px; background: #222; border: 1px solid #444;
            color: #fff; border-radius: 4px; font-size: 13px;
        }
        .cost { color: #888; font-size: 12px; font-family: monospace; }

        .main {
            flex: 1; display: flex; flex-direction: column;
            overflow: hidden; padding: 10px;
            gap: 10px;
        }

        .screen-container {
            flex: 1; display: flex; justify-content: center; align-items: center;
            background: #000; border-radius: 8px; overflow: hidden;
            min-height: 0;
        }
        .screen-container img {
            max-width: 100%; max-height: 100%; object-fit: contain;
        }
        .no-signal {
            color: #555; font-size: 14px;
        }

        .chat-panel {
            height: 260px; display: flex; flex-direction: column;
            background: #1a1a1a; border-radius: 8px; border: 1px solid #333;
        }

        .log {
            flex: 1; overflow-y: auto; padding: 10px; font-family: monospace;
            font-size: 12px; line-height: 1.6; color: #aaa;
        }
        .log .agent { color: #4caf50; }
        .log .claude { color: #64b5f6; }
        .log .error { color: #ef5350; }
        .log .cost-line { color: #ffb74d; }

        .chat-input {
            display: flex; border-top: 1px solid #333;
        }
        .chat-input input {
            flex: 1; padding: 12px 16px; background: transparent;
            border: none; color: #fff; font-size: 14px; outline: none;
        }
        .chat-input input::placeholder { color: #555; }
        .chat-input button {
            padding: 12px 20px; border: none; cursor: pointer;
            font-size: 13px; font-weight: 600;
        }
        .btn-send {
            background: #4caf50; color: #fff;
        }
        .btn-send:hover { background: #43a047; }
        .btn-stop {
            background: #ef5350; color: #fff;
        }
        .btn-stop:hover { background: #e53935; }
        .btn-send:disabled, .btn-stop:disabled {
            opacity: 0.4; cursor: default;
        }
    </style>
</head>
<body>
    <header>
        <div style="display:flex;align-items:center">
            <span class="status-dot" id="statusDot"></span>
            <h1>Locked PC Agent</h1>
        </div>
        <div class="settings">
            <label>Prompt rate:</label>
            <input type="number" id="promptRate" min="1" max="120" value="10" step="1">
            <label>sec</label>
            <span class="cost" id="costDisplay">$0.0000</span>
        </div>
    </header>

    <div class="main">
        <div class="screen-container">
            <img id="screenImg" style="display:none" />
            <span class="no-signal" id="noSignal">No signal — waiting for capture device</span>
        </div>

        <div class="chat-panel">
            <div class="log" id="log"></div>
            <div class="chat-input">
                <input type="text" id="taskInput" placeholder="Tell the agent what to do on the locked PC…"
                       autofocus />
                <button class="btn-send" id="btnSend">Send</button>
                <button class="btn-stop" id="btnStop" disabled>Stop</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const socket = io();
        const log = document.getElementById('log');
        const screenImg = document.getElementById('screenImg');
        const noSignal = document.getElementById('noSignal');
        const taskInput = document.getElementById('taskInput');
        const btnSend = document.getElementById('btnSend');
        const btnStop = document.getElementById('btnStop');
        const statusDot = document.getElementById('statusDot');
        const promptRate = document.getElementById('promptRate');
        const costDisplay = document.getElementById('costDisplay');

        let running = false;

        function appendLog(text, cls) {
            const div = document.createElement('div');
            div.textContent = text;
            if (cls) div.className = cls;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        socket.on('frame', (data) => {
            screenImg.src = 'data:image/png;base64,' + data.image;
            screenImg.style.display = 'block';
            noSignal.style.display = 'none';
        });

        socket.on('log', (data) => {
            let cls = '';
            if (data.text.includes('[Agent]')) cls = 'agent';
            else if (data.text.includes('[Claude]')) cls = 'claude';
            else if (data.text.includes('[Error]')) cls = 'error';
            else if (data.text.includes('[Cost]')) cls = 'cost-line';
            appendLog(data.text, cls);
        });

        socket.on('cost', (data) => {
            costDisplay.textContent = '$' + data.total_cost.toFixed(4);
        });

        socket.on('status', (data) => {
            running = data.running;
            statusDot.classList.toggle('running', running);
            btnSend.disabled = running;
            btnStop.disabled = !running;
            taskInput.disabled = running;
        });

        socket.on('settings', (data) => {
            promptRate.value = data.prompt_rate;
        });

        btnSend.addEventListener('click', () => {
            const task = taskInput.value.trim();
            if (!task) return;
            socket.emit('start_task', { task });
        });

        btnStop.addEventListener('click', () => {
            socket.emit('stop_task');
        });

        taskInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !running) {
                btnSend.click();
            }
        });

        promptRate.addEventListener('change', () => {
            const rate = parseFloat(promptRate.value) || 10;
            socket.emit('set_prompt_rate', { rate });
        });
    </script>
</body>
</html>
