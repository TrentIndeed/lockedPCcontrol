<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locked PC Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
        }
        header h1 { font-size: 16px; font-weight: 600; }
        .status-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #555; display: inline-block; margin-right: 8px;
        }
        .status-dot.running { background: #4caf50; }

        .settings {
            display: flex; align-items: center; gap: 12px; font-size: 13px;
        }
        .settings label { color: #aaa; }
        .settings input[type=number] {
            width: 60px; padding: 4px 8px; background: #222; border: 1px solid #444;
            color: #fff; border-radius: 4px; font-size: 13px;
        }
        .cost { color: #888; font-size: 12px; font-family: monospace; }

        .main {
            flex: 1; display: flex; flex-direction: column;
            overflow: hidden; padding: 10px;
            gap: 10px;
        }

        .screen-container {
            flex: 1; display: flex; justify-content: center; align-items: center;
            background: #000; border-radius: 8px; overflow: hidden;
            min-height: 0;
        }
        .screen-container img {
            max-width: 100%; max-height: 100%; object-fit: contain;
        }
        .no-signal { color: #555; font-size: 14px; }

        .bottom-panels {
            display: flex; gap: 10px; height: 300px;
        }

        .chat-panel {
            flex: 1; display: flex; flex-direction: column;
            background: #1a1a1a; border-radius: 8px; border: 1px solid #333;
        }

        .log {
            flex: 1; overflow-y: auto; padding: 10px; font-family: monospace;
            font-size: 12px; line-height: 1.6; color: #aaa;
        }
        .log .agent { color: #4caf50; }
        .log .action { color: #64b5f6; }
        .log .error { color: #ef5350; }
        .log .cost-line { color: #ffb74d; }
        .log .user-msg { color: #ce93d8; }
        .log .thinking {
            color: #78909c; font-style: italic;
            border-left: 2px solid #37474f; padding-left: 8px;
            margin: 4px 0; white-space: pre-wrap; word-break: break-word;
        }

        .chat-input {
            display: flex; border-top: 1px solid #333;
        }
        .chat-input input {
            flex: 1; padding: 12px 16px; background: transparent;
            border: none; color: #fff; font-size: 14px; outline: none;
        }
        .chat-input input::placeholder { color: #555; }
        .chat-input button {
            padding: 12px 20px; border: none; cursor: pointer;
            font-size: 13px; font-weight: 600;
        }
        .btn-send { background: #4caf50; color: #fff; }
        .btn-send:hover { background: #43a047; }
        .btn-stop { background: #ef5350; color: #fff; }
        .btn-stop:hover { background: #e53935; }
        .btn-send:disabled, .btn-stop:disabled {
            opacity: 0.4; cursor: default;
        }

        .sidebar {
            width: 300px; display: flex; flex-direction: column; gap: 10px;
        }

        .panel {
            flex: 1; background: #1a1a1a; border-radius: 8px;
            border: 1px solid #333; display: flex; flex-direction: column;
            overflow: hidden;
        }
        .panel-header {
            padding: 8px 12px; font-size: 12px; font-weight: 600;
            color: #888; text-transform: uppercase; letter-spacing: 0.5px;
            border-bottom: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center;
        }
        .panel-header button {
            background: none; border: none; color: #666; cursor: pointer;
            font-size: 11px;
        }
        .panel-header button:hover { color: #aaa; }
        .panel-body {
            flex: 1; overflow-y: auto; padding: 8px;
            font-size: 12px; font-family: monospace;
        }

        .task-entry {
            padding: 6px 8px; border-radius: 4px; margin-bottom: 4px;
            background: #222; cursor: pointer;
        }
        .task-entry:hover { background: #2a2a2a; }
        .task-entry .task-text {
            color: #e0e0e0; white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis;
        }
        .task-entry .task-meta {
            color: #666; font-size: 11px; margin-top: 2px;
        }
        .task-entry.running { border-left: 2px solid #4caf50; }
        .task-entry.done { border-left: 2px solid #64b5f6; }
        .task-entry.stopped { border-left: 2px solid #ff9800; }
        .task-entry.error { border-left: 2px solid #ef5350; }

        .note-entry {
            padding: 4px 8px; color: #ce93d8; margin-bottom: 2px;
        }

        .note-input {
            display: flex; border-top: 1px solid #333;
        }
        .note-input input {
            flex: 1; padding: 8px 10px; background: transparent;
            border: none; color: #ce93d8; font-size: 12px; outline: none;
        }
        .note-input input::placeholder { color: #444; }
    </style>
</head>
<body>
    <header>
        <div style="display:flex;align-items:center">
            <span class="status-dot" id="statusDot"></span>
            <h1>Locked PC Agent</h1>
        </div>
        <div class="settings">
            <label>Prompt rate:</label>
            <input type="number" id="promptRate" min="1" max="120" value="3" step="1">
            <label>sec</label>
            <span class="cost" id="costDisplay">$0.0000</span>
            <label style="margin-left:8px">Scale:</label>
            <button id="btnScaleDown" style="background:#444;border:none;color:#aaa;padding:4px 8px;border-radius:4px;font-size:12px;cursor:pointer">-</button>
            <button id="btnScaleUp" style="background:#444;border:none;color:#aaa;padding:4px 8px;border-radius:4px;font-size:12px;cursor:pointer">+</button>
            <span id="scaleDisplay" style="color:#888;font-family:monospace;font-size:11px;min-width:60px"></span>
            <label style="margin-left:8px">Profile:</label>
            <select id="profileSelect" style="background:#222;border:1px solid #444;color:#fff;padding:4px 8px;border-radius:4px;font-size:12px">
                <option value="">none (generic)</option>
            </select>
            <button id="btnCalibrate" style="background:#ff9800;border:none;color:#fff;padding:4px 8px;border-radius:4px;font-size:12px;cursor:pointer;margin-left:8px">Calibrate</button>
            <button id="btnClickTest" style="background:#2196f3;border:none;color:#fff;padding:4px 8px;border-radius:4px;font-size:12px;cursor:pointer;margin-left:4px" title="Click center of screen to test accuracy">Test Click</button>
        </div>
    </header>

    <div class="main">
        <div class="screen-container">
            <img id="screenImg" style="display:none" />
            <span class="no-signal" id="noSignal">No signal — waiting for capture device</span>
        </div>

        <div class="bottom-panels">
            <div class="chat-panel">
                <div class="log" id="log"></div>
                <div class="chat-input">
                    <input type="text" id="taskInput"
                           placeholder="Tell the agent what to do on the locked PC…" autofocus />
                    <button class="btn-send" id="btnSend">Send</button>
                    <button id="btnNewTask" style="display:none;padding:12px 20px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:#4caf50;color:#fff">New Task</button>
                    <button class="btn-stop" id="btnStop" disabled>Stop</button>
                </div>
            </div>

            <div class="sidebar">
                <div class="panel">
                    <div class="panel-header">
                        Task History
                        <button id="btnClearTasks">clear</button>
                    </div>
                    <div class="panel-body" id="taskHistory"></div>
                </div>
                <div class="panel">
                    <div class="panel-header">
                        Session Notes
                        <button id="btnClearNotes">clear</button>
                    </div>
                    <div class="panel-body" id="sessionNotes"></div>
                    <div class="note-input">
                        <input type="text" id="noteInput"
                               placeholder="Add a note for the agent to remember…" />
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const socket = io();
        const log = document.getElementById('log');
        const screenImg = document.getElementById('screenImg');
        const noSignal = document.getElementById('noSignal');
        const taskInput = document.getElementById('taskInput');
        const btnSend = document.getElementById('btnSend');
        const btnStop = document.getElementById('btnStop');
        const statusDot = document.getElementById('statusDot');
        const promptRate = document.getElementById('promptRate');
        const costDisplay = document.getElementById('costDisplay');
        const taskHistory = document.getElementById('taskHistory');
        const sessionNotes = document.getElementById('sessionNotes');
        const noteInput = document.getElementById('noteInput');
        const btnClearNotes = document.getElementById('btnClearNotes');
        const btnClearTasks = document.getElementById('btnClearTasks');

        let running = false;
        let thinkingDiv = null;  // current streaming thinking element

        function appendLog(text, cls) {
            const div = document.createElement('div');
            div.textContent = text;
            if (cls) div.className = cls;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        function renderTaskLog(tasks) {
            taskHistory.innerHTML = '';
            for (let i = tasks.length - 1; i >= 0; i--) {
                const t = tasks[i];
                const div = document.createElement('div');
                let statusCls = 'stopped';
                if (t.status === 'running') statusCls = 'running';
                else if (t.status.startsWith('done')) statusCls = 'done';
                else if (t.status.startsWith('error')) statusCls = 'error';
                div.className = 'task-entry ' + statusCls;
                div.innerHTML = `
                    <div class="task-text">${escHtml(t.task)}</div>
                    <div class="task-meta">${t.time} — ${escHtml(t.status)} (${t.steps} steps)</div>
                `;
                div.addEventListener('click', () => {
                    if (!running) {
                        taskInput.value = t.task;
                        taskInput.focus();
                    }
                });
                taskHistory.appendChild(div);
            }
        }

        function renderNotes(notes) {
            sessionNotes.innerHTML = '';
            notes.forEach(n => {
                const div = document.createElement('div');
                div.className = 'note-entry';
                div.textContent = n;
                sessionNotes.appendChild(div);
            });
        }

        function escHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // --- screen feed ---
        socket.on('frame', (data) => {
            screenImg.src = 'data:image/png;base64,' + data.image;
            screenImg.style.display = 'block';
            noSignal.style.display = 'none';
        });

        // --- streaming thinking ---
        socket.on('thinking_start', () => {
            thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'thinking';
            thinkingDiv.textContent = '';
            log.appendChild(thinkingDiv);
            log.scrollTop = log.scrollHeight;
        });

        socket.on('thinking_token', (data) => {
            if (thinkingDiv) {
                thinkingDiv.textContent += data.token;
                log.scrollTop = log.scrollHeight;
            }
        });

        socket.on('thinking_end', () => {
            thinkingDiv = null;
        });

        // --- log messages --- (handled below with scale display)

        socket.on('cost', (data) => {
            costDisplay.textContent = '$' + data.total_cost.toFixed(4);
        });

        const btnNewTask = document.getElementById('btnNewTask');

        socket.on('status', (data) => {
            running = data.running;
            statusDot.classList.toggle('running', running);
            btnStop.disabled = !running;
            taskInput.disabled = false;
            if (running) {
                btnSend.textContent = 'Guide';
                btnSend.style.background = '#ff9800';
                btnNewTask.style.display = '';
                taskInput.placeholder = 'Guide the agent or type a new task…';
            } else {
                btnSend.textContent = 'Send';
                btnSend.style.background = '#4caf50';
                btnNewTask.style.display = 'none';
                taskInput.placeholder = 'Tell the agent what to do on the locked PC…';
            }
        });

        socket.on('task_log', (data) => {
            renderTaskLog(data);
        });

        socket.on('session_notes', (data) => {
            renderNotes(data);
        });

        socket.on('calibration_error', (data) => {
            appendLog('*** CALIBRATION ERROR: ' + data.message, 'error');
            if (data.error === 'acceleration') {
                alert('Mouse acceleration detected on the locked PC!\n\n' +
                      'Disable "Enhance pointer precision" in:\n' +
                      'Control Panel > Mouse > Pointer Options\n\n' +
                      'Then click Calibrate again.');
            } else if (data.error === 'accuracy') {
                alert('Calibration accuracy check failed!\n\n' + data.message);
            }
        });

        // --- controls ---
        function sendNewTask(text) {
            appendLog('> ' + text, 'user-msg');
            socket.emit('start_task', { task: text });
            taskInput.value = '';
        }

        btnSend.addEventListener('click', () => {
            const text = taskInput.value.trim();
            if (!text) return;
            if (running) {
                // Live guidance mode
                socket.emit('send_guidance', { message: text });
                taskInput.value = '';
            } else {
                sendNewTask(text);
            }
        });

        btnNewTask.addEventListener('click', () => {
            const text = taskInput.value.trim();
            if (!text) return;
            sendNewTask(text);
        });

        btnStop.addEventListener('click', () => {
            socket.emit('stop_task');
        });

        taskInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (e.shiftKey && running) {
                    // Shift+Enter while running = new task
                    const text = taskInput.value.trim();
                    if (text) sendNewTask(text);
                } else {
                    btnSend.click();
                }
            }
        });

        promptRate.addEventListener('change', () => {
            const rate = parseFloat(promptRate.value) || 10;
            socket.emit('set_prompt_rate', { rate });
        });

        noteInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const note = noteInput.value.trim();
                if (note) {
                    socket.emit('add_note', { note });
                    noteInput.value = '';
                }
            }
        });

        btnClearNotes.addEventListener('click', () => {
            socket.emit('clear_notes');
        });

        btnClearTasks.addEventListener('click', () => {
            socket.emit('clear_task_log');
        });

        document.getElementById('btnScaleDown').addEventListener('click', () => {
            socket.emit('adjust_scale', { direction: 'down' });
        });
        document.getElementById('btnScaleUp').addEventListener('click', () => {
            socket.emit('adjust_scale', { direction: 'up' });
        });
        document.getElementById('btnCalibrate').addEventListener('click', () => {
            socket.emit('calibrate');
        });
        document.getElementById('btnClickTest').addEventListener('click', () => {
            // Click center of screen to test accuracy
            socket.emit('click_test', { x: 640, y: 360 });
        });

        // --- profile selector ---
        const profileSelect = document.getElementById('profileSelect');
        profileSelect.addEventListener('change', () => {
            socket.emit('set_profile', { profile: profileSelect.value });
        });
        socket.on('profile', (data) => {
            profileSelect.innerHTML = '<option value="">none (generic)</option>';
            (data.profiles || []).forEach(p => {
                const opt = document.createElement('option');
                opt.value = p;
                opt.textContent = p;
                profileSelect.appendChild(opt);
            });
            profileSelect.value = data.active || '';
        });

        // Update scale display when settings arrive
        socket.on('settings', (data) => {
            promptRate.value = data.prompt_rate;
        });

        socket.on('log', (data) => {
            // Update scale display from config log messages
            const scaleMatch = data.text.match(/MICKEY_SCALE X=([\d.]+) Y=([\d.]+)/);
            if (scaleMatch) {
                document.getElementById('scaleDisplay').textContent = scaleMatch[1];
            }
            let cls = '';
            if (data.text.includes('[Agent]')) cls = 'agent';
            else if (data.text.includes('[Action]')) cls = 'action';
            else if (data.text.includes('[Error]') || data.text.includes('ERROR')) cls = 'error';
            else if (data.text.includes('[Cost]')) cls = 'cost-line';
            else if (data.text.includes('[Memory]')) cls = 'user-msg';
            appendLog(data.text, cls);
        });
    </script>
</body>
</html>
